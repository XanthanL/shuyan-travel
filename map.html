<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行地图 - 树言·旅记</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        .map-header {
            text-align: center;
            margin-bottom: var(--space-xl);
        }
        
        .map-title {
            font-size: 2.5rem;
            font-weight: normal;
            color: var(--color-dark-earth);
            margin-bottom: var(--space-sm);
        }
        
        .map-description {
            font-size: 1.1rem;
            color: var(--color-earth);
            max-width: 650px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* 地图页面布局 */
        .map-layout {
            display: flex;
            height: 650px;
            background: var(--color-paper);
            border: 1px solid var(--color-border);
            overflow: hidden;
            margin-bottom: var(--space-xl);
        }

        .map-sidebar {
            width: 350px;
            border-right: 1px solid var(--color-border);
            display: flex;
            flex-direction: column;
            background-color: rgba(139, 115, 85, 0.02);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: var(--font-sans);
            font-size: 0.9rem;
            color: var(--color-earth);
        }

        .show-all-btn {
            background: none;
            border: 1px solid var(--color-earth);
            color: var(--color-earth);
            padding: 4px 12px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .show-all-btn:hover {
            background: var(--color-earth);
            color: white;
        }

        .location-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .map-main {
            flex: 1;
            position: relative;
        }

        #travel-map {
            width: 100%;
            height: 100%;
        }

        /* 列表项 */
        .location-item {
            padding: 20px;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--color-border);
            cursor: pointer;
            transition: all 0.3s;
        }

        .location-item:hover {
            background: rgba(139, 115, 85, 0.05);
        }

        .location-item.active {
            border-left: 3px solid var(--color-dark-earth);
            background: rgba(139, 115, 85, 0.08);
        }

        .location-item-name {
            display: block;
            font-weight: bold;
            color: var(--color-dark-earth);
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .location-item-date {
            font-size: 0.85rem;
            color: var(--color-earth);
            font-family: var(--font-sans);
            display: block;
            margin-bottom: 10px;
        }

        .location-item-desc {
            font-size: 0.95rem;
            color: var(--color-ink);
            line-height: 1.5;
        }

        .travel-stats-simple {
            display: flex;
            justify-content: center;
            gap: 80px;
            padding: var(--space-xl) 0;
            border-top: 1px solid var(--color-border);
        }

        .stat-box {
            font-size: 1.1rem;
            color: var(--color-earth);
        }

        .stat-box strong {
            font-size: 2.2rem;
            color: var(--color-dark-earth);
            margin-right: 8px;
            font-weight: normal;
        }

        @media (max-width: 900px) {
            .map-layout { flex-direction: column-reverse; height: 850px; }
            .map-sidebar { width: 100%; height: 350px; border-right: none; border-top: 1px solid var(--color-border); }
            .map-main { height: 500px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="site-header">
            <h1 class="site-title">树言·旅记</h1>
        </header>
        
        <nav class="site-nav">
            <a href="index.html" class="nav-link">时间线</a>
            <a href="map.html" class="nav-link active">旅行地图</a>
            <a href="about.html" class="nav-link">关于树言</a>
        </nav>
        
        <main class="main-content">
            <div class="map-header">
                <h2 class="map-title">旅行足迹</h2>
                <p class="map-description">这是我用双脚在大地上写下的诗。左侧是记忆的索引，右侧是它们精准的地理归宿。</p>
            </div>
            
            <div class="map-layout">
                <aside class="map-sidebar">
                    <div class="sidebar-header">
                        <span id="location-count">正在读取记录...</span>
                        <button class="show-all-btn" onclick="showAllLocations()">缩放全图</button>
                    </div>
                    <div class="location-list-container" id="location-list"></div>
                </aside>

                <div class="map-main">
                    <div id="travel-map"></div>
                </div>
            </div>

            <div class="travel-stats-simple">
                <div class="stat-box"><strong>8</strong> 年旅程</div>
                <div class="stat-box"><strong>22</strong> 个省份</div>
                <div class="stat-box"><strong>156</strong> 篇日记</div>
            </div>
        </main>
        
        <footer class="site-footer">
            <p>© 2018-2026 树言·旅记 | 记录每一次出发</p>
        </footer>
    </div>
    
    <script src="js/stories.js"></script>
    <script src="js/map.js"></script>
</body>
</html>
